# Server
server.port=8080
spring.application.name=interview-platform

# Database - works for both local and Docker
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/interview_platform}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT
jwt.secret=${JWT_SECRET:interviewPlatformSecretKey2024SuperLongKeyForSecurity}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Gemini AI
gemini.api.key=${GEMINI_API_KEY:your-key-here}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.interviewplatform=INFO