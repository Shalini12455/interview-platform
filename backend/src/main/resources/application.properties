# Server
server.port=${PORT:8080}
spring.application.name=interview-platform

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:interview_platform}?sslmode=require
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database=postgresql

# JWT
jwt.secret=${JWT_SECRET:interviewPlatformSecretKey2024SuperLongKeyForSecurity}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Gemini AI
gemini.api.key=${GEMINI_API_KEY:your-key-here}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.interviewplatform=INFO
logging.level.org.hibernate.SQL=OFF