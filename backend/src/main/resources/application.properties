# Server
server.port=8080
spring.application.name=interview-platform

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/interview_platform
spring.datasource.username=postgres
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=interviewPlatformSecretKey2024SuperLongKeyForSecurity
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# AI API
openai.api.key=YOUR_OPENAI_API_KEY_HERE

# Logging
logging.level.com.interviewplatform=DEBUG