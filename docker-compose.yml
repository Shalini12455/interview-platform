version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: interview-db
    environment:
      POSTGRES_DB: interview_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - interview-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interview-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/interview_platform
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: admin123
      JWT_SECRET: interviewPlatformSecretKey2024SuperLongKeyForSecurity
      JWT_EXPIRATION: 86400000
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - interview-network
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: interview-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - interview-network
    restart: unless-stopped

networks:
  interview-network:
    driver: bridge

volumes:
  postgres_data:
